name: Android Build APK

on:
  push:
    branches: [ "main", "master" ] # يشتغل البناء فوراً بمجرد رفع أي تعديل على هذه الفروع
  workflow_dispatch: # يتيح لك تشغيل البناء يدوياً بضغطة زر

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Base64 Decode Keystore # (اختياري لو كان عندك مفتاح توقيع، أو يخرج APK غير موقع للتجربة)
      run: echo "Building Debug APK..."

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build with Gradle
      run: ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: DracoLauncher-Debug
        path: app/build/outputs/apk/debug/app-debug.apk
